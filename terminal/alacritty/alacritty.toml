[font]
size = 16
# normal = { family = "Intel One Mono", style = "Regular" }
normal = { family = "IntoneMono Nerd Font", style = "Regular" }

[window]
decorations = "none"
# opacity = 0.5
opacity = 1.0

[general]
live_config_reload = true

# dichromacy-like colors

[colors.primary]
foreground = "#000000" # fg
background = "#fefefe" # bg

[colors.selection]
text       = "#000000" # fg
background = "#f8ec59" # yellow (region)

[colors.cursor]
# cursor = "#4d9cc9" # blue (lightened)
cursor = "#7ab8d9" # blue (lightened)
text   = "#fefefe" # bg

[colors.normal]
black   = "#000000" # fg        (color0)
red     = "#d55e00" # vermillion (color1)
green   = "#009e73" # bluegreen  (color2)
yellow  = "#e69f00" # orange — yellow (#f8ec59) is invisible on white (color3)
blue    = "#0072b2" # blue       (color4)
magenta = "#cc79a7" # redpurple  (color5)
cyan    = "#56b4e9" # skyblue    (color6)
white   = "#848ea9" # grey       (color7)

[colors.bright]
black   = "#383a42" # fg-alt      (color8)
red     = "#d55e00" # vermillion  (color9)
green   = "#007b5a" # teal        (color10)
yellow  = "#e69f00" # orange      (color11)
blue    = "#005282" # dark-blue   (color12)
magenta = "#b5608e" # violet      (color13)
cyan    = "#2a8cbf" # dark-cyan   (color14)
white   = "#555555" # base5       (color15)
